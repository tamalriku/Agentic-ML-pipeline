services:
  - type: web
    name: agentic-ml-pipeline
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false   # You'll paste this in the Render dashboard
    plan: free
